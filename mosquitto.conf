# =====================================================================
# Network Listener Settings
# =====================================================================
# Listen globally on port 1883 for incoming device telemetry
listener 1883 0.0.0.0

# Allow anonymous connections (Removes username/password checks for rapid testing)
allow_anonymous true

# =====================================================================
# Data Persistence & Logging
# =====================================================================
# Keep data alive across container cycles
persistence true
persistence_location /mosquitto/data/

# Log runtime output directly to the container console for live debugging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information